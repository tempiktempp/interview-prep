<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Interview Prep Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {--bg: #1c2333; --bg-card: #232d42; --bg-raised: #2a3550; --bg-deep: #17202f; --border: #2e3d58; --border-hi: #3d5080; --gold: #c9a84c; --gold-lt: #e8c97a; --gold-dim: #7a5e24; --text-1: #e8edf5; --text-2: #8fa3c8; --text-3: #4f6490; --green: #3db87a; --amber: #e0953a; --red: #d95f5f; --blue: #5b9bd5; --purple: #8b7fd4; --radius: 8px; --radius-lg: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text-1); min-height:100vh; font-size:14px; line-height:1.6; }
        .topnav {background:var(--bg-deep); border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:54px; position:sticky; top:0; z-index:200; box-shadow:0 2px 20px rgba(0,0,0,0.4); }
        .nav-logo { font-family:'Playfair Display',serif; font-size:18px; color:var(--gold); letter-spacing:-0.01em; }
        .nav-logo span { color:var(--text-2); font-size:13px; font-family:'DM Sans',sans-serif; font-weight:400; margin-left:10px; }
        .nav-right { display:flex; align-items:center; gap:12px; }
        .quiz-btn {font-family:'DM Mono',monospace; font-size:11px; padding:6px 14px; border-radius:var(--radius); border:1px solid var(--border-hi); background:transparent; color:var(--text-2); cursor:pointer; transition:all 0.18s; }
        .quiz-btn:hover,.quiz-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.08); }
        .layout { display:flex; height:calc(100vh - 54px); }
        .sidebar {width:240px; flex-shrink:0; background:var(--bg-deep); border-right:1px solid var(--border); overflow-y:auto; padding:16px 0; }
        .sidebar-label { font-size:10px; font-weight:600; letter-spacing:0.1em; color:var(--text-3); text-transform:uppercase; padding:8px 16px 4px; }
        .company-btn {width:100%; background:none; border:none; padding:9px 16px; display:flex; align-items:center; gap:10px; cursor:pointer; text-align:left; color:var(--text-2); }
        .company-btn:hover { background:rgba(255,255,255,0.03); }
        .company-btn.active { background:rgba(201,168,76,0.08); color:var(--gold); }
        .co-name { font-size:13px; font-weight:500; flex:1; }
        .co-tier {font-size:9px; font-weight:600; padding:1px 5px; border-radius:3px; }
        .t1 { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
        .t2 { background:rgba(91,155,213,0.15); color:#7eb8e8; border:1px solid rgba(91,155,213,0.3); }
        .t3 { background:rgba(61,184,122,0.15); color:#5dce96; border:1px solid rgba(61,184,122,0.3); }
        .co-status { width:7px; height:7px; border-radius:50%; }
        .status-ready { background:var(--green); }
        .status-pending { background:var(--border-hi); }
        .main { flex:1; overflow-y:auto; }
        .state-msg { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:12px; color:var(--text-3); }
        .co-header { background:var(--bg-deep); border-bottom:1px solid var(--border); padding:0 32px; }
        .co-header-inner { display:flex; align-items:center; justify-content:space-between; padding:16px 0 10px; }
        .co-title { font-family:'Playfair Display',serif; font-size:20px; }
        .round-tabs { background:var(--bg-deep); border-bottom:1px solid var(--border); padding:0 32px; display:flex; }
        .rtab {background:none; border:none; border-bottom:2px solid transparent; color:var(--text-3); padding:12px 18px; cursor:pointer; }
        .rtab.active { color:var(--gold); border-bottom-color:var(--gold); }
        .round-content { max-width:860px; margin:0 auto; padding:24px 32px 60px; }
        .q-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:9px; overflow:hidden; }
        .q-hdr { width:100%; background:none; border:none; padding:13px 17px; display:flex; align-items:center; gap:12px; cursor:pointer; text-align:left; color:var(--text-1); }
        .q-body { padding:0 17px 17px; border-top:1px solid var(--border); }
        .code-block { background:var(--bg-deep); border:1px solid var(--border); padding:12px; font-family:'DM Mono',monospace; white-space:pre-wrap; color:var(--text-2); margin-top:5px;}
        .reveal-btn { width:100%; margin-top:11px; background:var(--bg-raised); border:1px dashed var(--border-hi); padding:10px; color:var(--gold); cursor:pointer; }
    </style>
</head>
<body>
    <div class="topnav">
        <div class="nav-logo">Interview Prep <span>SDE 2 · Java Backend</span></div>
        <div class="nav-right">
            <span id="navQuizCount" style="font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;display:none"></span>
            <button class="quiz-btn" id="quizBtn" onclick="toggleQuiz()">○ Quiz Mode</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-label">Companies</div>
            <div id="companyList"></div>
        </div>
        <div class="main" id="mainPanel">
            <div class="state-msg" id="welcomeMsg">
                <h2>Select a Company</h2>
                <p>Choose a company from the sidebar to start your prep session.</p>
            </div>
            <div id="companyView" style="display:none"></div>
        </div>
    </div>

    <script>
        // ── Helpers (Moved to top to prevent ReferenceErrors) ──
        function esc(s) {
            if (!s) return "";
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        // ── State ──
        let index = null;
        let activeCompId = null;
        let activeData = null;
        let activeRound = null;
        let quizMode = false;
        let searchVal = "";
        let activeTag = null;
        let expandedId = null;
        let revealedSet = new Set();
        let codeOpenSet = new Set();
        const cache = {};

        // ── Bootstrap ──
        async function init() {
            try {
                // Fetching from data/_index.json
                const res = await fetch('data/_index.json');
                if (!res.ok) throw new Error("Could not find _index.json");
                index = await res.json();
                buildSidebar();
            } catch(e) {
                console.error(e);
                document.getElementById("welcomeMsg").innerHTML = `<h2>Load Error</h2><p style="color:var(--red)">Failed to load data. Ensure 'data/_index.json' exists.</p>`;
            }
        }

        function buildSidebar() {
            if (!index || !index.companies) return;
            let out = "";
            const tiers = ["T1", "T2", "T3"];
            const labels = {"T1": "Finance", "T2": "Fintech / Product", "T3": "Global / Remote"};

            tiers.forEach(tier => {
                out += `<div class="sidebar-label">${labels[tier]}</div>`;
                index.companies.filter(c => c.tier === tier).forEach(c => {
                    out += `
                    <button class="company-btn" id="cbtn-${c.id}" onclick="selectCompany('${c.id}')">
                        <span class="co-status status-${c.status || 'pending'}"></span>
                        <span class="co-name">${esc(c.displayName)}</span>
                        <span class="co-tier ${c.tier.toLowerCase()}">${c.tier}</span>
                    </button>`;
                });
            });
            document.getElementById("companyList").innerHTML = out;
        }

        async function selectCompany(id) {
            document.querySelectorAll(".company-btn").forEach(b => b.classList.remove("active"));
            document.getElementById("cbtn-" + id)?.classList.add("active");

            const meta = index.companies.find(c => c.id === id);
            if (meta?.status === "pending") {
                document.getElementById("welcomeMsg").style.display = "flex";
                document.getElementById("welcomeMsg").innerHTML = `<h2>${esc(meta.displayName)}</h2><p>Data not yet generated.</p>`;
                document.getElementById("companyView").style.display = "none";
                return;
            }

            if (!cache[id]) {
                try {
                    const res = await fetch(`data/${id}.json`);
                    cache[id] = await res.json();
                } catch(e) {
                    document.getElementById("welcomeMsg").innerHTML = `<h2>Error</h2><p>Could not load ${id}.json</p>`;
                    return;
                }
            }

            activeCompId = id;
            activeData = cache[id];
            activeRound = activeData.rounds[0].id;
            resetRoundState();
            document.getElementById("welcomeMsg").style.display = "none";
            document.getElementById("companyView").style.display = "block";
            renderCompany();
        }

        function resetRoundState() {
            expandedId = null;
            revealedSet = new Set();
            codeOpenSet = new Set();
            searchVal = "";
            activeTag = null;
        }

        function renderCompany() {
            const d = activeData;
            const round = d.rounds.find(r => r.id === activeRound) || d.rounds[0];
            
            const tabs = d.rounds.map(r => `
                <button class="rtab ${r.id === activeRound ? 'active' : ''}" onclick="switchRound('${r.id}')">
                    ${esc(r.label)} <span style="font-size:10px; opacity:0.6">(${r.questions.length})</span>
                </button>`).join("");

            const filtered = filterQuestions(round.questions);

            document.getElementById("companyView").innerHTML = `
                <div class="co-header">
                    <div class="co-header-inner">
                        <span class="co-title">${esc(d.displayName)}</span>
                        <span class="ctc-pill">${esc(d.ctcRange)}</span>
                    </div>
                </div>
                <div class="round-tabs">${tabs}</div>
                <div class="round-content">
                    <div class="q-list">
                        ${filtered.map((q, i) => buildCard(q, i + 1)).join("")}
                    </div>
                </div>`;
        }

        function filterQuestions(qs) {
            if (!searchVal) return qs;
            return qs.filter(q => q.topic.toLowerCase().includes(searchVal.toLowerCase()));
        }

        function buildCard(q, num) {
            const isOpen = expandedId === q.id;
            const isRev = revealedSet.has(q.id);
            let body = "";

            if (isOpen) {
                body = `<div class="q-body">
                    <div style="color:var(--text-3); font-size:10px; margin-top:10px;">QUESTION</div>
                    <div class="code-block">${esc(q.question)}</div>`;
                
                if (!quizMode || isRev) {
                    body += `<div style="color:var(--blue); font-size:10px; margin-top:10px;">ANSWER</div>
                             <div class="code-block">${esc(q.answer)}</div>`;
                } else {
                    body += `<button class="reveal-btn" onclick="revealAnswer('${q.id}')">Reveal Answer</button>`;
                }
                body += `</div>`;
            }

            return `
            <div class="q-card">
                <button class="q-hdr" onclick="toggleCard('${q.id}')">
                    <span style="opacity:0.5">#${num}</span>
                    <span>${esc(q.topic)}</span>
                </button>
                ${body}
            </div>`;
        }

        function toggleCard(id) {
            expandedId = expandedId === id ? null : id;
            renderCompany();
        }

        function revealAnswer(id) {
            revealedSet.add(id);
            renderCompany();
        }

        function switchRound(id) {
            activeRound = id;
            renderCompany();
        }

        function toggleQuiz() {
            quizMode = !quizMode;
            revealedSet = new Set();
            const btn = document.getElementById("quizBtn");
            btn.textContent = quizMode ? "◉ Quiz Mode" : "○ Quiz Mode";
            btn.classList.toggle("active", quizMode);
            if (activeData) renderCompany();
        }

        init();
    </script>
</body>
</html>
